name: 'CLA Assistant'

on:
    issue_comment:
        types: [created]
    pull_request_target:
        types: [opened, closed, synchronize]

permissions:
    actions: write
    contents: write
    pull-requests: write
    statuses: write

jobs:
    CLAAssistant:
        runs-on: ubuntu-latest
        steps:
            - name: 'CLA Assistant'
              if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the VRCX-0 Individual Contributor License Agreement and I hereby sign the CLA.') || github.event_name == 'pull_request_target'
              uses: contributor-assistant/github-action@v2.6.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  path-to-signatures: 'signatures/version1/cla.json'
                  path-to-document: 'https://github.com/Map1en/VRCX-0/blob/master/CLA.md'
                  branch: 'master'
                  allowlist: 'Map1en,dependabot[bot],*[bot]'
                  custom-notsigned-prcomment: |
                      Thank you for your contribution.

                      Before this pull request can be merged, please read and sign the [VRCX-0 Individual Contributor License Agreement](https://github.com/Map1en/VRCX-0/blob/master/CLA.md).

                      To sign, comment exactly:

                      > I have read the VRCX-0 Individual Contributor License Agreement and I hereby sign the CLA.

                      You only need to sign this CLA version once. Your signature applies to your future contributions to VRCX-0 unless a later written agreement says otherwise.

                      If your employer may own rights to your work, or if you are contributing on behalf of a company or organization, please do not sign the individual CLA yet — contact the maintainer first.
                  custom-pr-sign-comment: 'I have read the VRCX-0 Individual Contributor License Agreement and I hereby sign the CLA.'
                  custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
